<nav>
    <div class="nav-left">
        <a href="{% url 'product_list' %}" class="nav-brand">Bosh sahifa</a>
        {% if user.is_authenticated %}
            <span class="user-greet">Salom, {{ user.username }}!</span>
        {% endif %}
    </div>

    <div class="nav-right">
        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Chiqish</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Kirish</a>
            <a href="{% url 'register' %}">Ro'yxatdan o'tish</a>
        {% endif %}
    </div>
</nav>
