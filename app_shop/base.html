<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mini Do'kon{% endblock %}</title>
    <style>
       
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 1100px; margin: 20px auto; padding: 20px; }
        
        
        nav { 
    background: #2c3e50; 
    padding: 10px 50px; 
    color: white; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
}

.nav-left {
    display: flex;
    align-items: center;
    gap: 30px; 
}

.nav-brand {
    font-size: 18px;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

.user-greet {
    font-size: 16px;
    color: #bdc3c7;
}

.logout-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.logout-btn:hover {
    background: #c0392b;
}

        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; margin-top: 20px; }
        .product-card { 
            background: white; border-radius: 12px; padding: 20px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            transition: all 0.3s ease; 
            text-align: center;
        }

        .product-card:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 12px 20px rgba(0,0,0,0.2); 
        }

        .price { font-size: 20px; color: #27ae60; font-weight: bold; margin: 10px 0; }
        .category-badge { background: #eee; padding: 4px 10px; border-radius: 20px; font-size: 12px; color: #666; }
        .status { margin-bottom: 15px; font-weight: bold; }
        .btn-detail { display: inline-block; background: #3498db; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; }
        .btn-detail:hover { background: #2980b9; }

        .auth-form { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: 50px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>
    {% include 'app_shop/navbar.html' %}
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
